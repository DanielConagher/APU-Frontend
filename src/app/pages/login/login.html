<div class="login-container">

    <div class="card">

        <h1>
            Iniciar sesión
        </h1>

        <form (ngSubmit)="iniciarSesion()">

            <input type="email" placeholder="Correo electrónico" autocomplete="email" [(ngModel)]="correo"
                name="correo">

            <input type="password" placeholder="Contraseña" autocomplete="current-password" [(ngModel)]="contrasena"
                name="contrasena">

            <button type="submit" [disabled]="cargando">

                {{ cargando
                ? 'Ingresando...'
                : 'Ingresar' }}

            </button>

            <div class="register-link">

                ¿No tienes cuenta?

                <a routerLink="/register">
                    Regístrate aquí
                </a>

            </div>

        </form>

        <div *ngIf="error" class="error">

            {{ error }}

        </div>

        <div *ngIf="mensaje" class="success">

            {{ mensaje }}

        </div>

    </div>

</div>
